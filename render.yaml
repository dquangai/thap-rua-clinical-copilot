services:
  - type: web
    name: thap-rua-clinical-api
    runtime: python
    plan: free
    branch: staging
    region: singapore
    buildCommand: pip install -r backend/api/requirements.txt
    startCommand: cd backend/api && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /ready
    autoDeployTrigger: checksPass
    buildFilter:
      paths:
        - backend/api/**
        - backend/ai/**
        - rules/**
        - render.yaml
    envVars:
      - key: APP_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.12.13
      - key: MONGODB_DATABASE
        value: cilinal_copilot
      - key: PII_FAIL_CLOSED
        value: "true"
      - key: FRONTEND_ORIGIN
        value: https://thap-rua-clinical-copilot-1.onrender.com
      - key: MONGODB_URI
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.6-sol
      - key: LLM_API_KEY
        sync: false

  - type: web
    name: thap-rua-clinical-web
    runtime: static
    branch: staging
    buildCommand: npm ci && npm run build
    staticPublishPath: frontend/dist
    autoDeployTrigger: checksPass
    buildFilter:
      paths:
        - frontend/**
        - packages/**
        - package.json
        - package-lock.json
        - render.yaml
    envVars:
      - key: NODE_VERSION
        value: 22.17.0
      - key: VITE_API_BASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

