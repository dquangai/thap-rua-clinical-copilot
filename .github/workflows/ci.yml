name: CI

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main, staging]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  conflict-check:
    name: Conflict markers
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Reject unresolved merge markers
        shell: bash
        run: |
          if git grep -n -E '^(<<<<<<<|>>>>>>>)' -- ':!docs/github-render-cicd.md'; then
            echo 'Unresolved merge conflict markers detected.'
            exit 1
          fi

  backend:
    name: Backend tests
    needs: conflict-check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PYTHONPATH: ${{ github.workspace }}/backend/api:${{ github.workspace }}/backend/ai
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/api/requirements.txt
      - name: Install dependencies
        run: python -m pip install -r backend/api/requirements.txt
      - name: Compile Python sources
        run: python -m compileall -q backend/api/app backend/ai/clinical_checker
      - name: Run API tests
        working-directory: backend/api
        run: python -m pytest
      - name: Run AI pipeline tests
        run: python -m unittest discover -s backend/ai/tests

  frontend:
    name: Frontend build
    needs: conflict-check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Type-check and build frontend
        run: npm run build
